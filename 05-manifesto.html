<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manifesto · 显影自性</title>
<style>
  :root {
    --bg: #0e0c08;
    --paper: #f0ece2;
    --muted: #8a8378;
    --accent: #6b3a1f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--paper);
    font-family: 'DM Serif Display', 'Georgia', serif;
  }
  .stage {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    position: relative;
  }
  .corner {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .corner.tl { top: 32px; left: 32px; }
  .corner.tr { top: 32px; right: 32px; text-align: right; }
  .corner.bl { bottom: 32px; left: 32px; }
  .corner.br { bottom: 32px; right: 32px; text-align: right; }

  .manifesto {
    max-width: 1100px;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .line-1 {
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 400;
    line-height: 1.3;
    color: var(--paper);
    letter-spacing: -0.01em;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadein 1.5s 0.3s forwards;
  }

  .line-2 {
    font-size: clamp(20px, 2.4vw, 28px);
    font-style: italic;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 80px;
    opacity: 0;
    animation: fadein 1.5s 1.0s forwards;
  }

  .line-3 {
    font-size: clamp(40px, 6vw, 88px);
    font-weight: 400;
    line-height: 1.15;
    color: var(--paper);
    letter-spacing: -0.02em;
    margin-bottom: 80px;
    opacity: 0;
    animation: fadein 2s 1.8s forwards;
  }

  .line-4 {
    font-size: clamp(18px, 2vw, 24px);
    color: var(--accent);
    line-height: 1.5;
    font-family: 'Outfit', system-ui, sans-serif;
    font-weight: 300;
    letter-spacing: 0.05em;
    opacity: 0;
    animation: fadein 1.8s 2.8s forwards;
  }

  .breath {
    margin-top: 100px;
    width: 1px;
    height: 80px;
    background: linear-gradient(to bottom, transparent, var(--paper), transparent);
    opacity: 0;
    animation: breathe 4s 4s infinite, fadein 1s 4s forwards;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.7; }
  }

  .footer {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
    opacity: 0;
    animation: fadein 1.5s 5s forwards;
  }
  .footer span { color: var(--paper); margin: 0 8px; }

  /* Subtle paper texture using SVG */
  .grain {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    opacity: 0.04;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
</style>
</head>
<body>
<div class="grain"></div>

<div class="stage">

  <div class="corner tl">wcaca / vision-pages</div>
  <div class="corner tr">05 / manifesto</div>

  <div class="manifesto">

    <div class="line-1">
      This is not an app.<br>
      This is not a tool.<br>
      This is not a feature.
    </div>

    <div class="line-2">
      You don't open it.<br>
      You don't use it.<br>
      You don't close it.
    </div>

    <div class="line-3">
      You <em>are</em> in it.
    </div>

    <div class="line-4">
      显影自性 · A Reflective Feedback Loop
    </div>

  </div>

  <div class="breath"></div>

  <div class="footer">
    <span>if you're seeing this</span><br>
    you're already in
  </div>

</div>

<script>
  // No buttons. No CTA. No interaction.
  // Just a page that exists, and you seeing it.
  console.log('You are in a Reflective Feedback Loop.');
</script>

</body>
</html>
